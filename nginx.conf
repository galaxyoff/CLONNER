# Nginx configuration with DDoS protection
events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # DDoS protection - limits
    limit_req_zone $binary_remote_addr zone=ddos:10m rate=100r/s;
    limit_conn addr 50;

    # Connection limits
    keepalive_timeout 65;
    client_max_body_size 10M;
    client_body_timeout 15s;
    client_header_timeout 15s;

    # Upstream to Flask app
    upstream estagiario {
        server estagiario:5000;
    }

    server {
        listen 80;
        server_name _;

        # Rate limiting - general
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 10;

        # Security
        server_tokens off;

        location / {
            proxy_pass http://estagiario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Protect login endpoint more strictly
        location /admin/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://estagiario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Block common exploit patterns
        location ~ /\.(git|env) {
            deny all;
        }

        location ~* \.(py|sh|sql|db)$ {
            deny all;
        }
    }

    # HTTPS server (configure SSL certificates)
