version: '3.8'

services:
  estagiario:
    build: .
    container_name: estagiario_app
    ports:
      - "5000:5000"
    volumes:
      - ./output:/app/output
      - ./users.db:/app/users.db
    environment:
      - FLASK_DEBUG=False
      - RATE_LIMIT=100 per minute
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
    command: python app.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: estagiario_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - estagiario
    restart: unless-stopped

networks:
  default:
    name: estagiario_network
